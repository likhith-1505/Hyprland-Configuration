background {
    monitor =
    path = /home/asta/Pictures/wallpaper.jpg
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}



input-field {
    monitor =
    size = 280, 55
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##ffffff99">⚔️ Anti-Magic required.</span></i>
    hide_input = false
    position = 0, -210
    halign = center
    valign = center
   hide_input = false        # Set to true to hide password dots
    fail_color = rgb(204, 34, 34)  # Color when password fails
}
general {
    no_fade_in = false        # Smooth fade-in animation
    grace = 0                 # No grace period
    disable_loading_bar = false  # Show loading indicator
}
# Date display
label {
    monitor =
    text = cmd[update:1000] echo -e "$(LC_TIME=en_US.UTF-8 date +"%A, %B %d")"
    color = rgba(216, 222, 233, 0.90)
    font_size = 25
    font_family = SF Pro Display Semibold
    position = 0, 350
    halign = center
    valign = center
}

# Time display
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = rgba(216, 222, 233, 0.90)
    font_size = 120
    font_family = SF Pro Display Bold
    position = 0, 230
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:5000] echo "⚡ Realm active for $(uptime -p)"
    color = rgba(255, 255, 255, 0.7)
    font_size = 16
    position = 0, -350
    halign = center
    valign = center
}

